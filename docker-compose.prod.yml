# ============================================================
# 운영 스택 — postgres + backend + frontend + Caddy(자동 HTTPS)
# 사용:  cp .env.example .env  (값 채우기)  →  docker compose -f docker-compose.prod.yml up -d
# DB 포트(5432)는 외부로 열지 않는다(내부 네트워크만). 도메인 DNS를 이 서버로 향하게 하면 Caddy가 인증서를 자동 발급.
# ============================================================
services:
  postgres:
    image: postgres:16
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms_owner
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?set in .env}
      POSTGRES_DB: lms
    volumes:
      - lms-pgdata:/var/lib/postgresql/data
    # 포트 미노출 — 내부 네트워크(backend)에서만 접근
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_owner -d lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: lms-backend
    container_name: lms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lms
      SPRING_DATASOURCE_USERNAME: lms_app
      SPRING_DATASOURCE_PASSWORD: ${LMS_APP_DB_PASSWORD:-lms_app_pw}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/lms
      SPRING_FLYWAY_USER: lms_owner
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?set in .env}
      LMS_JWT_SECRET: ${LMS_JWT_SECRET:?set a strong secret in .env}
      LMS_PLATFORM_ADMIN_EMAIL: ${LMS_PLATFORM_ADMIN_EMAIL:?set in .env}
      LMS_PLATFORM_ADMIN_PASSWORD: ${LMS_PLATFORM_ADMIN_PASSWORD:?set a strong password in .env}
      LMS_UPLOAD_DIR: /app/uploads
      # 이메일(SMTP) — 있으면 실발송
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@localhost}
      APP_PAYMENT_PROVIDER: ${APP_PAYMENT_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - lms-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?set your API domain in .env}
    image: lms-frontend
    container_name: lms-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    container_name: lms-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set your domain in .env}
      API_DOMAIN: ${API_DOMAIN:?set your api domain in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  lms-pgdata:
  lms-uploads:
  caddy-data:
  caddy-config:
