name: CI

# Git 저장소를 초기화하고 GitHub에 푸시하면 자동 실행됩니다.
# (로컬 PC의 Avast 트러스트스토어/DOCKER_HOST 설정은 CI에선 불필요 — gradle.properties는 gitignore됨)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest   # Docker 내장 → Testcontainers 동작
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests (Testcontainers + Flyway)
        run: ./gradlew test --no-daemon

      - name: Build
        run: ./gradlew build -x test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
